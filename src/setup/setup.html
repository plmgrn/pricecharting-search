<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome — Search on PriceCharting</title>
  <link rel="stylesheet" href="setup.css">
</head>
<body>
  <main>
    <header>
      <img src="../icons/pricecharting-search_64x64.png"
           width="48" height="48" alt="">
      <h1>Search on PriceCharting</h1>
      <p class="subtitle">Quick setup</p>
    </header>

    <form id="setup-form" autocomplete="off">

      <label class="field">
        <span class="label">Category</span>
        <select name="broadCategory">
          <option value="">(none)</option>
          <option value="video-games">Video games</option>
          <option value="trading-cards">Trading cards</option>
          <option value="comic-books">Comics</option>
          <option value="funko-pops">Funko Pop</option>
          <option value="coins">Coins</option>
          <option value="lego-sets">LEGO</option>
        </select>
        <small>Narrows search results to one category.</small>
      </label>

      <label class="field">
        <span class="label">Region</span>
        <select name="regionName">
          <option value="">(none)</option>
          <option value="ntsc">NTSC / Americas</option>
          <option value="pal">PAL / Europe</option>
          <option value="japan">Japan</option>
        </select>
        <small>Filters results to your regional releases.</small>
      </label>

      <label class="field">
        <span class="label">Site language</span>
        <select name="language">
          <option value="">English</option>
          <option value="de">Deutsch</option>
          <option value="es">Espanol</option>
          <option value="fr">Francais</option>
          <option value="nl">Nederlands</option>
          <option value="pt">Portugues</option>
          <option value="ru">Pусский</option>
        </select>
        <small>Changes the language of the PriceCharting results page.</small>
      </label>

      <div class="actions">
        <a href="#" id="skip" class="skip-link">Skip</a>
        <button type="submit" id="save" class="primary">Finish</button>
      </div>

    </form>

    <p class="footnote">
      These can be changed anytime in
      <a href="#" id="open-settings">settings</a>.
    </p>
  </main>

  <script type="module" src="setup.js"></script>
</body>
</html>
